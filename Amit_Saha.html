  <script>
  
      window.addEventListener('load', function() {
      
  
  var menubtn = $('a#menubtn');
  
  function positionMenuButton() {
      var sidrMenu = $('#sidr');
      var offset = sidrMenu.css('right');
      menubtn.animate({ 'margin-right': offset.replace('-','') }, 200);
  }
  
   menubtn.sidr({
      name: 'sidr',
      side: 'right',
      displace: false,
      onOpen: function (name) {
          positionMenuButton();
      },
      onClose: function (name) {
          positionMenuButton();
      }
  });
  
  $('.contentarea, .footerarea, .secondfooterarea').click(function (e) {
      $.sidr('close', 'sidr');
  });
  
  $(window).resize(function () {
      var menu = $('div#sidr');    
      var w = getWindowWidth();
  
      if (w > 1170)
      { 
          if (!sf.hasClass('sf-js-enabled')) { sf.addClass('sf-menu').superfish('init'); sf.find('ul.submenu').css('display', ''); }       
          if (menu.css('display') == 'none')        
              menu.show();                   
          else if (menu.css('display') == 'block')
              $('body').removeClass('sidr-open').removeAttr('style');
          
          $('.mobilemenuitem').addClass('submenuitem').addClass('submenu').removeClass('mobilemenuitem').find('a').addClass('submenulink');
      }
      else 
      {
          sf.superfish('destroy').removeClass('sf-js-enabled').removeClass('sf-menu'); sf.find('ul.submenu').css('display', 'none');                                
          $('.submenuitem.submenu').addClass('mobilemenuitem').removeClass('submenuitem').removeClass('submenu').find('a').removeClass('submenulink');        
      }
  });
  
  $('#sidr li.menuitem:has(ul)').click(function(e){
      e.preventDefault();
      if (getWindowWidth() <= 1170)    
          $('ul.mobilemenuitem', this).toggle('fast');    
  });
  
  $('#sidr li.menuitem:has(ul) ul li').bind('click', function(e){
      e.stopPropagation();
  });
  
  $('#main-menu').css('display', '');
  $('.submenuitem.submenu').hide();
  
   
  if (getWindowWidth() <= 1170) {
      sf.superfish('destroy').removeClass('sf-js-enabled').removeClass('sf-menu'); sf.find('ul.submenu').css('display', 'none'); 
      $('.submenuitem.submenu').addClass('mobilemenuitem').removeClass('submenuitem').removeClass('submenu').find('a').removeClass('submenulink');        
  }
  
  
      });
  </script>

  <script>
  function setIframesize () {
      var frames = document.querySelectorAll('.resizeMe');
      for (var i = 0, len = frames.length; i < len; i++) {
          frames[i].style.height = 0;
          var height = Math.ceil(frames[i].contentWindow.document.documentElement.scrollHeight);
          frames[i].style.height = height + 'px';
      }
  }
  window.addEventListener('load', setIframesize);
  window.addEventListener('resize', setIframesize);
  </script>
